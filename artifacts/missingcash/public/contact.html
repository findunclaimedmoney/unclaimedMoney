<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — MissingCash Australia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080d1a;color:#e8edf5;font-family:'Inter',sans-serif;min-height:100vh;padding:80px 24px;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,13,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#00e5a0;text-decoration:none;}
.nav-link{color:#8892a4;text-decoration:none;font-size:0.85rem;}
.nav-link:hover{color:#e8edf5;}
.container{max-width:560px;margin:60px auto 0;}
h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;margin-bottom:12px;}
.sub{color:#8892a4;line-height:1.7;margin-bottom:40px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
label{font-size:0.72rem;font-weight:600;color:#8892a4;text-transform:uppercase;letter-spacing:0.06em;}
input,textarea,select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;color:#e8edf5;font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:#00e5a0;}
textarea{resize:vertical;min-height:120px;}
select option{background:#1a2035;}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#00e5a0,#00b07a);color:#000;font-weight:700;font-size:1rem;border:none;border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.info{margin-top:32px;display:flex;flex-direction:column;gap:16px;}
.info-item{display:flex;gap:12px;align-items:flex-start;font-size:0.9rem;}
.info-icon{font-size:1.2rem;flex-shrink:0;}
.info-text{color:#8892a4;line-height:1.5;}
.info-text strong{color:#e8edf5;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">MissingCash</a>
  <a href="/" class="nav-link">← Back to Home</a>
</nav>
<div class="container">
  <h1>Contact Us</h1>
  <p class="sub">Have a question about your search results or need help claiming your money? We're here to help.</p>
  <div class="card">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" placeholder="John Smith">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label>Subject</label>
      <select>
        <option>Question about my results</option>
        <option>Help claiming my money</option>
        <option>Refund request</option>
        <option>Technical issue</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="How can we help you?"></textarea>
    </div>
    <button class="btn" onclick="alert('Message sent! We will reply within 24 hours.')">Send Message</button>
  </div>
  <div class="info">
    <div class="info-item">
      <div class="info-icon">📧</div>
      <div class="info-text"><strong>Email</strong><br>admin@missingcash.com.au</div>
    </div>
    <div class="info-item">
      <div class="info-icon">⏱</div>
      <div class="info-text"><strong>Response Time</strong><br>We reply within 24 hours on business days.</div>
    </div>
    <div class="info-item">
      <div class="info-icon">🇦🇺</div>
      <div class="info-text"><strong>Based in Australia</strong><br>All support is handled locally.</div>
    </div>
  </div>
</div>
</body>
</html>
