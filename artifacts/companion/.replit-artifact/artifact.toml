kind = "web"
previewPath = "/companion/"
title = "AI Companion"
version = "1.0.0"
id = "artifacts/companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/companion/" ]
localPort = 25897

[services.development]
run = "pnpm --filter @workspace/companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/companion", "run", "build" ]
publicDir = "artifacts/companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25897"
BASE_PATH = "/companion/"
