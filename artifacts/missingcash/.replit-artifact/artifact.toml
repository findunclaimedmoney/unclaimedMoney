kind = "web"
previewPath = "/missingcash/"
title = "MissingCash"
version = "1.0.0"
id = "artifacts/missingcash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/missingcash/" ]
localPort = 23246

[services.development]
run = "pnpm --filter @workspace/missingcash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/missingcash", "run", "build" ]
publicDir = "artifacts/missingcash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23246"
BASE_PATH = "/missingcash/"
